# config/params.yaml
# Central configuration for the HEAPO-Predict pipeline.
# All hardcoded values live here. Never scatter magic numbers across scripts.

data:
  dataset_path: "./heapo_data/"       # path to extracted HEAPO dataset
  zenodo_record_id: 15056919           # pinned release — results tied to this version
  min_days_threshold: 180              # min days per household to include in modeling
                                       # justified in Phase 6.1: requires seasonal coverage

splits:
  train_end: "2023-05-31"              # training: all data up to and including this date
  val_end: "2023-11-30"                # validation: 2023-06-01 to this date
  test_end: "2024-03-21"               # test: 2023-12-01 to dataset end

modeling:
  random_seed: 42
  xgboost_early_stopping_rounds: 50
  ann_early_stopping_patience: 15
  shap_background_samples: 200         # background dataset size for KernelExplainer (ANN)
  optuna_n_trials: 80

evaluation:
  mape_floor_kwh: 0.5                  # exclude days below this threshold from MAPE/sMAPE
                                       # avoids division by near-zero values inflating %error

cleaning:
  smd_hard_cap_kwh: 500                # any day above this is a meter error (99th pct = 106 kWh)
  null_fraction_threshold: 0.30        # drop household entirely if ≥30% of target rows are null
  iqr_multiplier: 3.0                  # per-household IQR flag threshold (rows retained, not dropped)
  construction_year_min: 1900          # plausible building construction year range
  construction_year_max: 2025
  hp_install_year_min: 1980            # plausible HP installation year range
  hp_install_year_max: 2025
  hp_capacity_min_kw: 2.0              # plausible HP heating capacity range
  hp_capacity_max_kw: 60.0
  cop_min: 2.0                         # plausible normpoint COP range
  cop_max: 6.0
  heating_curve_temp_min: 15           # plausible HP supply temperature range (°C)
  heating_curve_temp_max: 70
  weather_cross_station_temp_threshold: 5.0   # flag station-days deviating >5°C from network mean
  living_area_flag_threshold_m2: 1000  # flag households with living area above this
  no_sunshine_stations:                # stations with no sunshine sensor (structural absence)
    - HbsbG
    - ceOxS
    - sV3mR

feature_engineering:
  include_reactive_energy: true        # Task 4.5 — power_factor_proxy feature
  include_autoregressive: false        # Task 4.6 — lag/rolling kWh features (off by default;
                                       # enabling requires strictly temporal split in Phase 6)
  living_area_buckets: [0, 100, 150, 200, 300, 10000]   # m² bins for Survey_Building_LivingArea
  building_age_year_bins: [0, 1970, 1990, 2010, 9999]   # construction year bins for building_age_bucket
  rolling_windows_days: [3, 7]         # rolling average windows for temperature features
  lag_days: [1]                        # lag days for temperature lag features
